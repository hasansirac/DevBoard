<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DevBoard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>DevBoard</h1>

    <section>
      <h2>Authentication</h2>
      <input type="text" id="username" placeholder="Username">
      <input type="password" id="password" placeholder="Password">
      <button id="registerBtn">Register</button>
      <button id="loginBtn">Login</button>
      <button id="logoutBtn">Logout</button>
    </section>

    <hr>

    <section>
      <h2>Create Board</h2>
      <input type="text" id="boardTitle" placeholder="Board title">
      <input type="text" id="boardDescription" placeholder="Board description">
      <button id="createBoardBtn">Create Board</button>
    </section>

    <hr>

    <section>
      <h2>Boards</h2>
      <div id="boardsContainer"></div>
    </section>

    <hr>

    <section>
      <h2>Tasks</h2>
      <p id="selectedBoardText">No board selected.</p>

      <input type="text" id="taskTitle" placeholder="Task title">
      <input type="text" id="taskDescription" placeholder="Task description">

      <select id="taskStatus">
        <option value="todo">Todo</option>
        <option value="in_progress">In Progress</option>
        <option value="done">Done</option>
      </select>

      <select id="taskPriority">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>

      <input type="date" id="taskDueDate">

      <button id="createTaskBtn">Create Task</button>

      <div id="tasksContainer"></div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
